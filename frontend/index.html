<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ReviewHub - The Verified Product Review Platform">
    <title>ReviewHub | Verified Insights</title>

    <!-- This will be the compiled Tailwind CSS file -->
    <link rel="stylesheet" href="./public/output.css">
</head>

<body class="flex flex-col min-h-screen">

    <!-- Navigation Module Placeholder -->
    <header id="navbar-container" class="sticky top-0 z-50 bg-white shadow-soft">
        <!-- JS will inject the Navbar here to keep HTML clean -->
    </header>

    <!-- Main Content Area -->
    <main id="app-root" class="flex-grow w-full max-w-screen-2xl mx-auto px-4 sm:px-8 lg:px-12 py-8">
        <!-- JS will dynamically inject page content here based on state -->
        <div class="flex items-center justify-center h-64">
            <p class="text-gray-500 text-lg animate-pulse">Loading ReviewHub...</p>
        </div>
    </main>

    <!-- Footer Module Placeholder -->
    <footer id="footer-container" class="bg-surface-dark text-white py-8 mt-auto">
        <!-- JS will inject Footer here -->
    </footer>

    <!-- Main Application Entry Point -->
    <script type="module" src="./src/app.js"></script>
</body>

</html>
